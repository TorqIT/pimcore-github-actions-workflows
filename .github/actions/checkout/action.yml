name: "Checkout"
description: "Checks out the project repository and any defined submodules"
inputs:
  PROJECT_REPOSITORY:
    description: "The repository to checkout, in the format 'owner/repo'."
    required: true
  PROJECT_REPOSITORY_REF:
    description: "The branch, tag, or commit to checkout. Default is 'main'."
    required: false
    default: "main"
  SUBMODULES:
    description: "Whether to checkout submodules. Default is 'false'."
    required: false
    default: "false"
  GITHUB_APP_CHECKOUT:
    description: "Whether to use a GitHub App for authentication when checking out the repository. Default is 'false'."
    required: false
    default: "false"
  GITHUB_APP_ID:
    description: "The ID of the GitHub App to use for authentication when checking out the repository. Required if GITHUB_APP_CHECKOUT is 'true'."
    required: false
  GITHUB_APP_PRIVATE_KEY:
    description: "The private key of the GitHub App to use for authentication when checking out the repository. Required if GITHUB_APP_CHECKOUT is 'true'."
    required: false

runs: 
  using: "composite"
  steps:
      - name: Create GitHub App token
        id: create_gh_app_token
        uses: actions/create-github-app-token@v2
        if: inputs.GITHUB_APP_CHECKOUT == 'true'
        with:
          app-id: ${{ inputs.GITHUB_APP_ID }}
          private-key: ${{ inputs.GITHUB_APP_PRIVATE_KEY }}
          repositories: ${{ inputs.PROJECT_REPOSITORY }}

      - name: Checkout main repository
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.PROJECT_REPOSITORY }}
          ref: ${{ inputs.PROJECT_REPOSITORY_REF }}
          submodules: false 
          token: ${{ steps.create_gh_app_token.outputs.token || inputs.GITHUB_TOKEN }}

      - name: Parse and checkout submodules
        shell: bash
        if: inputs.SUBMODULES == 'true'
        run: |
          set -e
          token="${{ steps.create_gh_app_token.outputs.token || inputs.GITHUB_TOKEN }}"

          if [ ! -f .gitmodules ]; then
            echo "No submodules found."
            exit 0
          fi

          echo "Parsing submodules..."
          git config --file .gitmodules --get-regexp 'submodule\..*\.url' | while read key url; do
            path=$(echo "$key" | sed -E 's/submodule\.(.*)\.url/\1/')
            echo "Submodule path: $path, URL: $url"

            # Rewrite HTTPS URL to include GitHub App token
            if [[ "$url" == https://* ]]; then
              url="https://${token}@${url#https://}"
            fi

            # Initialize and update submodule
            git submodule init "$path"
            git config submodule."$path".url "$url"
            git submodule update --init "$path"
          done